<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Tính Chu Vi và Diện Tích</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 class="tieu-de">Tính Chu Vi và Diện Tích</h1>

    <div class="menu">
        <p class="menu-item"><strong>Chọn phép tính (nhập số 1-4):</strong></p>
        <p class="menu-item">1. Chu vi hình chữ nhật</p>
        <p class="menu-item">2. Diện tích hình chữ nhật</p>
        <p class="menu-item">3. Chu vi hình vuông</p>
        <p class="menu-item">4. Diện tích hình vuông</p>
    </div>

    <form class="form-tinh">
        <input type="number" class="input-box lua-chon" placeholder="Nhập lựa chọn (1-4)">
        <input type="number" class="input-box so-a" placeholder="Nhập chiều dài (hoặc cạnh)">
        <input type="number" class="input-box so-b" placeholder="Nhập chiều rộng (nếu là hình chữ nhật)">
        <button type="button" class="nut-tinh" onclick="tinhToan()">Tính</button>
    </form>

    <div class="ket-qua"></div>

    <script src="script.js"></script>
</body>

</html>
